<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AML Identifier Flow Demo</title>
  <style>
    :root {
      --bg: #f6f9fb;
      --surface: #ffffff;
      --ink: #17313f;
      --muted: #71838f;
      --line: #dce8ee;
      --primary: #1f75a8;
      --primary-dark: #155a82;
      --teal: #1ba39c;
      --red: #d84b4b;
      --amber: #c9861a;
      --green: #22875a;
      --shadow: 0 18px 50px rgba(23, 49, 63, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--ink); font-family: Calibri, "Microsoft YaHei", sans-serif; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; transition: grid-template-columns .22s ease; }
    .app.collapsed { grid-template-columns: 82px 1fr; }

    .sidebar { background: #102c3a; color: #dff3f7; padding: 20px; position: sticky; top: 0; height: 100vh; overflow: hidden; }
    .sidebar-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 26px; }
    .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
    .brand-mark { flex: 0 0 42px; width: 42px; height: 42px; border-radius: 13px; background: linear-gradient(135deg, #37b7ad, #277db2); display: grid; place-items: center; color: white; font-weight: 700; letter-spacing: -0.04em; }
    .brand-text { white-space: nowrap; transition: opacity .16s ease, transform .16s ease; }
    .brand h1 { margin: 0; font-size: 16px; line-height: 1.1; color: #fff; }
    .brand p { margin: 2px 0 0; color: #9fbdc7; font-size: 10px; }
    .collapse-btn { width: 34px; height: 34px; border-radius: 10px; background: rgba(255,255,255,.1); color: white; flex: 0 0 34px; }
    .app.collapsed .brand-text, .app.collapsed .nav-text, .app.collapsed .sidebar-footer, .app.collapsed .language-switch { opacity: 0; transform: translateX(-8px); pointer-events: none; }
    .app.collapsed .sidebar { padding-left: 20px; padding-right: 20px; }
    .app.collapsed .sidebar-top { justify-content: center; flex-direction: column; }
    .app.collapsed .collapse-btn { transform: rotate(180deg); }

    .language-switch { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 22px; transition: opacity .16s ease, transform .16s ease; }
    .language-switch button { padding: 8px 10px; border-radius: 10px; color: #b9d4dc; background: rgba(255,255,255,.06); font-weight: 700; }
    .language-switch button.active { background: #dff3f7; color: #102c3a; }

    .nav { display: grid; gap: 8px; }
    .nav button { width: 100%; text-align: left; color: #b9d4dc; background: transparent; padding: 12px 14px; border-radius: 12px; transition: .18s ease; display: flex; align-items: center; gap: 12px; }
    .nav button.active, .nav button:hover { background: rgba(255,255,255,.1); color: white; }
    .nav-icon { width: 22px; height: 22px; border-radius: 7px; display: grid; place-items: center; background: rgba(255,255,255,.08); font-size: 12px; flex: 0 0 22px; }
    .nav-text { white-space: nowrap; transition: opacity .16s ease, transform .16s ease; }
    .nav-sub { display: block; color: #8fb2bd; font-size: 12px; margin-top: 2px; }

    .sidebar-footer { position: absolute; bottom: 24px; left: 20px; right: 20px; padding: 14px; border: 1px solid rgba(255,255,255,.12); border-radius: 14px; color: #a9c8d1; font-size: 12px; line-height: 1.45; transition: opacity .16s ease, transform .16s ease; }
    .main { padding: 30px 34px 48px; min-width: 0; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 24px; }
    .eyebrow { color: var(--teal); font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px; }
    .title { margin: 0; font-size: 32px; letter-spacing: -0.035em; }
    .subtitle { margin: 8px 0 0; color: var(--muted); font-size: 15px; }
    .status-pill { padding: 9px 13px; border-radius: 999px; background: #e8f7f5; color: #12736e; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .screen { display: none; }
    .screen.active { display: block; }

    .metric-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
    .dash-filter { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .dash-filter-label { font-weight: 700; font-size: 13px; color: var(--ink); }
    .dash-quick { padding: 6px 12px; }
    .rank-row { grid-template-columns: 1fr auto !important; }
    .footer-sep { margin: 0 6px; color: var(--muted); }
    .btn-export::before { content: '⤓'; margin-right: 5px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .metric { padding: 18px; min-height: 120px; }
    .metric-click { appearance: none; -webkit-appearance: none; width: 100%; text-align: left; font: inherit; color: inherit; cursor: pointer; transition: border-color .15s, transform .1s, box-shadow .15s; }
    .metric-click:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(31,117,168,.12); }
    .metric-label { color: var(--muted); font-size: 12px; line-height: 1.3; min-height: 32px; }
    .metric-value { margin-top: 16px; font-size: 30px; font-weight: 700; letter-spacing: -0.04em; }
    .metric-note { margin-top: 4px; font-size: 12px; color: var(--muted); }
    .todo-card { margin-bottom: 18px; }
    .todo-list { padding: 14px 20px 18px; display: grid; gap: 8px; }
    .todo-row { display: grid; grid-template-columns: auto auto minmax(150px, 1fr) minmax(0, 1.4fr) auto auto; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
    .todo-row.overdue { border-color: #e6a5a5; background: #fdf4f4; }
    .todo-main { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .todo-main .queue-name { font-weight: 600; }
    .todo-reason { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sla-chip { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; justify-self: end; }
    .sla-over { background: #fdecec; color: #b3261e; }
    .sla-today { background: #fff4e5; color: #a8600a; }
    .sla-ok { background: #eef3f8; color: #40607a; }
    .todo-review { padding: 7px 18px; }
    .todo-empty { padding: 28px; text-align: center; color: var(--muted); }
    .dashboard-grid { display: grid; grid-template-columns: 430px 1fr; gap: 18px; align-items: stretch; }
    .dashboard-card { height: 380px; display: flex; flex-direction: column; min-height: 0; }
    .dashboard-card .section-head { flex: 0 0 auto; }
    .scroll-area { flex: 1; min-height: 0; overflow: auto; }
    .section-head { display: flex; justify-content: space-between; gap: 16px; align-items: center; padding: 18px 20px 12px; border-bottom: 1px solid var(--line); }
    .section-head h2 { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
    .section-head p { margin: 3px 0 0; color: var(--muted); font-size: 13px; }
    .vendor-list { padding: 12px; display: grid; gap: 10px; }
    .vendor-row { display: grid; grid-template-columns: 1fr 78px 82px; gap: 10px; align-items: center; padding: 14px; border-radius: 14px; border: 1px solid transparent; background: #f7fbfc; text-align: left; width: 100%; color: var(--ink); }
    .vendor-row:hover { border-color: #bfe1e8; background: #f0f8fa; }
    .vendor-name { font-weight: 700; }
    .small-muted { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; }
    .score { font-weight: 800; font-size: 20px; letter-spacing: -0.03em; }
    .change { font-weight: 700; font-size: 13px; }
    .up { color: var(--red); } .down { color: var(--green); } .flat { color: var(--muted); }
    .table-wrap { overflow: auto; border-radius: 0 0 var(--radius) var(--radius); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: var(--muted); font-weight: 700; background: #f5fafb; padding: 12px 14px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th.sortable { cursor: pointer; user-select: none; transition: color .15s ease, background .15s ease; }
    th.sortable:hover { background: #eaf4f8; color: var(--ink); }
    th.sortable.sort-active { color: var(--primary-dark); }
    th .sort-arrow { display: inline-block; margin-left: 5px; font-size: 9px; opacity: .45; transform: translateY(-1px); }
    th.sort-active .sort-arrow { opacity: 1; color: var(--primary); }
    td { padding: 13px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    tr:last-child td { border-bottom: 0; } tbody tr:hover { background: #f9fcfd; }
    .tag { display: inline-flex; align-items: center; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .tag-blue { background: #e8f2fb; color: #1e668d; } .tag-green { background: #e6f5ee; color: var(--green); } .tag-amber { background: #fff3da; color: var(--amber); } .tag-red { background: #fde9e9; color: var(--red); } .tag-gray { background: #edf2f4; color: #5d6d75; }
    .btn { border-radius: 10px; padding: 8px 11px; font-weight: 700; font-size: 12px; transition: .16s ease; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: var(--primary-dark); }
    .btn-soft { background: #eaf4f8; color: var(--primary-dark); } .btn-soft:hover { background: #d9edf3; }
    .btn-plain { background: transparent; color: var(--primary); padding: 7px 0; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .crumb-home { display: inline-flex; align-items: center; gap: 4px; background: transparent; color: var(--primary); font-weight: 700; padding: 0; border-radius: 8px; transition: .15s ease; }
    .crumb-home:hover { background: #eaf4f8; color: var(--primary-dark); }
    .crumb-arrow { font-size: 18px; line-height: 1; font-weight: 800; }
    .crumb-sep { color: var(--muted); }
    .crumb-current { color: var(--muted); font-weight: 700; letter-spacing: .04em; text-transform: uppercase; font-size: 12px; }
    .btn-review-cta { padding: 12px 26px; font-size: 15px; border-radius: 12px; box-shadow: 0 8px 22px rgba(31,117,168,.32); }
    .btn-teal { background: linear-gradient(135deg, #37b7ad, #1ba39c); color: #fff; box-shadow: 0 8px 22px rgba(27,163,156,.32); }
    .btn-teal:hover { filter: brightness(1.05); }
    .actions { align-items: center; }
    .invest-section { display: grid; gap: 8px; }
    .invest-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .invest-steps { display: grid; gap: 4px; }
    .invest-step { font-size: 13px; color: var(--primary-dark); }
    .invest-evidence { display: grid; gap: 6px; }
    .invest-evi { font-size: 13px; line-height: 1.5; padding: 8px 10px; background: #fbfdfe; border: 1px solid var(--line); border-radius: 10px; }
    .invest-evi-src { display: inline-block; font-size: 11px; font-weight: 700; color: #1e668d; background: #e8f2fb; padding: 1px 7px; border-radius: 999px; margin-right: 8px; }
    .invest-playbook { display: grid; gap: 5px; }
    .invest-pb-item { font-size: 12.5px; line-height: 1.45; padding: 7px 10px; background: #e9f6f4; border: 1px solid #b9e7e2; border-radius: 10px; color: var(--ink); }
    .invest-package { font-size: 14px; line-height: 1.6; }
    .invest-rec { display: inline-block; margin-top: 10px; padding: 6px 14px; border-radius: 999px; font-weight: 800; font-size: 13px; }
    .invest-rec-escalate { background: #fde9e9; color: #d84b4b; }
    .invest-rec-investigate { background: #fff3da; color: #c9861a; }
    .invest-rec-clear { background: #e6f5ee; color: var(--green); }
    .invest-divider { height: 1px; background: var(--line); margin: 4px 0; }
    .invest-run-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .invest-run-row .small-muted { flex: 1; min-width: 180px; }
    #runInvestigateBtn:disabled { opacity: .55; cursor: default; }
    .held-tag { display: inline-block; padding: 3px 9px; border-radius: 8px; font-size: 12px; font-weight: 800; background: #102c3a; color: #fff; letter-spacing: .02em; }
    .reviewed-filter { width: auto; min-width: 150px; margin-top: 0; padding: 8px 11px; border: 1px solid var(--line); border-radius: 10px; background: white; font-size: 13px; color: var(--ink); }
    tr.legal-row-link { cursor: pointer; }
    tr.legal-row-link:hover { background: #eef7fa; }
    .tier-hero { background: linear-gradient(135deg, #f0fbfa, #eef6fb); border: 1px solid #cfe7ee; border-radius: 18px; padding: 18px 20px; margin-bottom: 16px; }
    .tier-hero-line { display: flex; align-items: center; gap: 12px; margin: 6px 0 8px; }
    .tier-hero-line strong { font-size: 20px; }
    .tier-hero .tier-badge { font-size: 18px; padding: 6px 14px; }
    .btn-investigate { margin-top: 14px; padding: 11px 22px; font-size: 14px; border-radius: 12px; background: linear-gradient(135deg, #37b7ad, #1ba39c); color: #fff; box-shadow: 0 8px 20px rgba(27,163,156,.34); transition: transform .15s ease, box-shadow .15s ease; }
    .btn-investigate:hover { transform: translateY(-1px); box-shadow: 0 12px 26px rgba(27,163,156,.45); }
    .tier-triggers { background: #fbfdfe; border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; margin-bottom: 14px; }
    .trigger-pills-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .trigger-pills-row .trigger-pill { font-size: 13px; padding: 5px 12px; }
    .case-foot { display: grid; grid-template-columns: 330px 1fr; gap: 18px; margin-top: 20px; }
    .case-foot .btn-review-cta { grid-column: 2; justify-self: start; min-width: 260px; }
    @media (max-width: 1200px) { .case-foot { grid-template-columns: 1fr; } .case-foot .btn-review-cta { grid-column: 1; } }
    .actions { display: flex; gap: 8px; align-items: center; }
    .actions-stacked { display: inline-flex; flex-direction: column; gap: 6px; align-items: stretch; min-width: 110px; }
    .actions-stacked .btn { width: 100%; text-align: center; white-space: nowrap; }
    .detail-layout { display: grid; grid-template-columns: 330px 1fr; gap: 18px; align-items: start; }
    .panel { padding: 20px; }
    .panel h3 { margin: 0 0 14px; font-size: 18px; }
    .kv { display: grid; gap: 11px; }
    .kv div { display: flex; justify-content: space-between; gap: 20px; padding-bottom: 11px; border-bottom: 1px solid var(--line); color: var(--muted); }
    .kv strong { color: var(--ink); text-align: right; }
    .score-hero { background: linear-gradient(135deg, #f0fbfa, #eef6fb); border: 1px solid #cfe7ee; border-radius: 18px; padding: 20px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; gap: 18px; }
    .score-hero .big { font-size: 54px; font-weight: 800; letter-spacing: -0.06em; line-height: 1; }
    .breakdown { display: grid; gap: 12px; }
    .break-row { background: #f8fbfc; border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
    .break-top { display: flex; justify-content: space-between; margin-bottom: 9px; font-weight: 700; gap: 12px; }
    .bar { height: 9px; border-radius: 999px; background: #e5eef2; overflow: hidden; }
    .bar span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--teal), var(--primary)); }
    .driver-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .driver { border: 1px solid var(--line); background: #fbfdfe; border-radius: 14px; padding: 14px; }
    .driver-top { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .driver-title { font-weight: 700; }
    .driver-meta { color: var(--muted); font-size: 12px; line-height: 1.4; }
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: start; }
    .slider-row { display: grid; grid-template-columns: 190px 1fr 52px; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
    .slider-row:last-child { border-bottom: 0; }
    input[type="range"] { width: 100%; accent-color: var(--primary); }
    .percent { font-weight: 800; text-align: right; }
    .notice { margin-top: 14px; padding: 13px 14px; background: #fff9ed; color: #8a6115; border: 1px solid #f3ddb0; border-radius: 14px; font-size: 13px; line-height: 1.45; }
    .legal-empty { padding: 30px; text-align: center; color: var(--muted); }

    .donut-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 18px 20px; }
    .donut-svg { width: 220px; height: 220px; flex: 0 0 220px; }
    .donut-legend { width: 100%; display: grid; gap: 6px; }
    .legend-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; border: 1px solid transparent; background: #f7fbfc; cursor: pointer; width: 100%; color: var(--ink); text-align: left; transition: .16s ease; }
    .legend-row:hover { border-color: #bfe1e8; background: #eaf4f8; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 12px; }
    .legend-label { flex: 1; font-size: 13px; font-weight: 600; }
    .legend-count { font-weight: 800; font-size: 14px; }
    .legend-pct { color: var(--muted); font-size: 12px; min-width: 38px; text-align: right; }
    .donut-insight { font-size: 12px; color: var(--muted); padding: 0 20px 18px; line-height: 1.5; }
    .donut-tabs { display: flex; gap: 6px; padding: 12px 20px 0; border-bottom: 1px solid var(--line); }
    .donut-tab { padding: 9px 14px; background: transparent; color: var(--muted); font-weight: 700; font-size: 13px; border-radius: 10px 10px 0 0; border: 0; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: .15s ease; }
    .donut-tab:hover { color: var(--ink); }
    .donut-tab.active { color: var(--primary-dark); border-bottom-color: var(--primary); background: rgba(31,117,168,.06); }
    .wb-count { display: inline-block; min-width: 20px; padding: 1px 7px; border-radius: 999px; background: #e8f2fb; color: #1e668d; font-size: 12px; font-weight: 800; margin-left: 4px; }
    .donut-tab.active .wb-count { background: var(--primary); color: #fff; }
    .title-inline { display: inline-flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
    .status-pill.title-pill { font-size: 13px; padding: 6px 14px; align-self: center; }

    .filter-bar { padding: 14px 18px; border-bottom: 1px solid var(--line); background: #fbfdfe; border-radius: var(--radius) var(--radius) 0 0; }
    .filter-row { display: flex; column-gap: 14px; row-gap: 10px; align-items: center; flex-wrap: wrap; }
    .filter-row > * { flex-shrink: 0; height: 38px; box-sizing: border-box; display: inline-flex; align-items: center; vertical-align: middle; margin: 0; }
    .filter-row select, .filter-row input[type="search"], .filter-row input[type="date"] { height: 38px; padding: 0 12px; border: 1px solid var(--line); border-radius: 10px; background: white; font-size: 13px; color: var(--ink); font-family: inherit; box-sizing: border-box; }
    .filter-row input[type="search"] { flex: 1 0 180px; min-width: 160px; max-width: 250px; }
    .filter-row select { min-width: 130px; max-width: 180px; }
    .filter-date-wrap { gap: 8px; font-size: 12px; color: var(--muted); font-weight: 700; padding-left: 4px; }
    .filter-date-wrap input[type="date"] { font-size: 12px; padding: 0 10px; }
    .filter-actions { display: flex; justify-content: flex-start; gap: 10px; margin-top: 12px; }
    .filter-actions .btn { padding: 0 18px; height: 38px; min-width: 96px; white-space: nowrap; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; }
    .filter-active { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
    .filter-active.empty { display: none; }
    .filter-active-label { color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; margin-right: 2px; }
    .filter-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 4px 4px 11px; background: #e8f2fb; color: var(--primary-dark); border-radius: 999px; font-size: 12px; font-weight: 700; }
    .filter-chip-key { color: var(--muted); font-weight: 600; margin-right: 3px; }
    .filter-chip-close { background: rgba(31,117,168,.15); color: var(--primary-dark); width: 18px; height: 18px; border-radius: 50%; display: inline-grid; place-items: center; font-size: 14px; line-height: 1; padding: 0; font-weight: 700; margin-left: 4px; }
    .filter-chip-close:hover { background: rgba(31,117,168,.32); }
    .risk-type-badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .risk-type-pill { padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; color: white; white-space: nowrap; }
    .tier-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 800; letter-spacing: .02em; }
    .tier-T1 { background: #fde9e9; color: #d84b4b; }
    .tier-T2 { background: #fff3da; color: #c9861a; }
    .tier-T3 { background: #eaf2f7; color: #5d8aa8; }
    .trigger-pills { display: flex; flex-direction: column; gap: 3px; }
    .trigger-pill { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 700; background: #fbeaea; color: #b23b3b; border: 1px solid #f3cccc; white-space: nowrap; }
    .ppv-cell { display: flex; align-items: center; gap: 8px; min-width: 120px; }

    .tier-sla-T1 { background: #d84b4b; color: #fff; animation: slaPulse 1.8s ease-in-out infinite; }
    .tier-sla-T2 { background: #c9861a; color: #fff; }
    .tier-sla-T3 { background: #eaf2f7; color: #5d8aa8; }
    @keyframes slaPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(216,75,75,.55); } 50% { box-shadow: 0 0 0 7px rgba(216,75,75,0); } }
    .overdue-tag { display: inline-block; padding: 3px 9px; border-radius: 8px; font-size: 11px; font-weight: 800; background: #d84b4b; color: #fff; letter-spacing: .02em; white-space: nowrap; }
    tr.row-overdue { background: rgba(216,75,75,.06); box-shadow: inset 3px 0 0 var(--red); }
    tr.row-overdue:hover { background: rgba(216,75,75,.1); }
    .queue-row.overdue { border-color: #f0c2c2; background: #fdf4f4; box-shadow: inset 3px 0 0 var(--red); }
    .qr-entries { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(16, 44, 58, .46); display: none; align-items: center; justify-content: center; z-index: 20; padding: 30px; }

    .modal { width: min(720px, 100%); background: white; border-radius: 24px; box-shadow: 0 30px 80px rgba(0,0,0,.22); overflow: hidden; max-height: calc(100vh - 56px); display: flex; flex-direction: column; }
    .modal-head, .modal-foot { flex: 0 0 auto; }
    .modal-body { flex: 1 1 auto; min-height: 0; overflow-y: auto; }
    .modal-head { padding: 22px 24px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; }

    label { font-weight: 700; font-size: 13px; }

    .check { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; color: var(--muted); font-size: 13px; display: flex; gap: 8px; align-items: center; }
    .modal-foot { padding: 18px 24px 24px; display: flex; justify-content: flex-end; gap: 10px; }
    .toast { position: fixed; right: 28px; bottom: 28px; background: #102c3a; color: white; padding: 13px 16px; border-radius: 14px; box-shadow: var(--shadow); opacity: 0; transform: translateY(12px); transition: .2s ease; z-index: 30; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .chat-fab { position: fixed; right: 28px; bottom: 28px; z-index: 25; width: 60px; height: 60px; border-radius: 20px; background: radial-gradient(circle at 30% 25%, #4cc9c1 0%, #277db2 55%, #0e3a55 100%); color: white; box-shadow: 0 18px 40px rgba(31,117,168,.42), inset 0 1px 0 rgba(255,255,255,.28); display: grid; place-items: center; transition: transform .25s ease, box-shadow .25s ease, opacity .2s ease; }
    .chat-fab svg { width: 30px; height: 30px; position: relative; z-index: 1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.22)); }
    .chat-fab::before { content: ''; position: absolute; inset: -10px; border-radius: 28px; background: radial-gradient(circle, rgba(55,183,173,.55), transparent 70%); filter: blur(12px); animation: fabPulse 2.4s ease-in-out infinite; z-index: -1; pointer-events: none; }
    .chat-fab::after { content: ''; position: absolute; inset: 0; border-radius: inherit; border: 1px solid rgba(255,255,255,.2); pointer-events: none; }
    .chat-fab:hover { transform: translateY(-3px); box-shadow: 0 22px 52px rgba(31,117,168,.55), inset 0 1px 0 rgba(255,255,255,.32); }
    body.chat-open .chat-fab { opacity: 0; transform: scale(.55); pointer-events: none; }
    @keyframes fabPulse { 0%, 100% { opacity: .4; transform: scale(.92); } 50% { opacity: .85; transform: scale(1.08); } }

    .chat-panel { position: fixed; right: 0; top: 0; bottom: 0; width: var(--chat-width, 420px); min-width: 320px; max-width: 90vw; background: white; border-radius: 24px 0 0 24px; box-shadow: -28px 0 70px rgba(16,44,58,.18); display: none; flex-direction: column; z-index: 28; overflow: hidden; }
    .chat-panel.open { display: flex; animation: chatSlide .22s ease; }
    @keyframes chatSlide { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .chat-resize { position: absolute; top: 0; left: 0; bottom: 0; width: 9px; cursor: ew-resize; z-index: 6; background: transparent; }
    .chat-resize::after { content: ''; position: absolute; left: 3px; top: 50%; width: 3px; height: 44px; transform: translateY(-50%); background: var(--line); border-radius: 3px; opacity: .6; transition: background .15s ease, opacity .15s ease, height .15s ease; }
    .chat-resize:hover::after, body.chat-resizing .chat-resize::after { background: var(--teal); opacity: 1; height: 64px; }
    body.chat-open .main { padding-right: calc(var(--chat-width, 420px) + 8px); }
    body.chat-resizing { user-select: none; cursor: ew-resize !important; }
    body.chat-resizing * { cursor: ew-resize !important; }
    .chat-head { padding: 16px 18px; background: linear-gradient(135deg, #37b7ad, #277db2); color: white; display: flex; justify-content: space-between; align-items: center; gap: 12px; }

    .chat-messages { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #f7fbfc; }
    .chat-msg { padding: 11px 13px; border-radius: 14px; font-size: 13px; line-height: 1.55; max-width: 92%; }
    .chat-msg.bot { background: white; color: var(--ink); align-self: flex-start; border: 1px solid var(--line); }
    .chat-msg.user { background: var(--primary); color: white; align-self: flex-end; }

    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chat-suggestion { padding: 5px 10px; border-radius: 999px; background: #eaf4f8; border: 1px solid #cfe7ee; color: var(--primary-dark); font-size: 12px; font-weight: 700; cursor: pointer; }
    .chat-suggestion:hover { background: #d9edf3; }
    .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--line); background: white; }
    .chat-input input { flex: 1; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fbfdfe; }
    .chat-result-card { background: #fbfdfe; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-top: 8px; }
    .chat-result-card + .chat-result-card { margin-top: 6px; }
    .chat-result-card .row1 { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .chat-result-card .pid { font-weight: 800; font-size: 13px; }
    .chat-result-card .row2 { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .chat-result-card .row3 { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 8px; }
    .chat-result-card .openbtn { padding: 5px 10px; font-size: 11px; }
    .chat-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 8px; }
    .chat-stat { background: #fbfdfe; border: 1px solid var(--line); border-radius: 10px; padding: 8px; text-align: center; }
    .chat-stat-value { font-size: 18px; font-weight: 800; color: var(--ink); }
    .chat-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chat-loading { display: flex !important; gap: 5px; align-items: center; padding: 12px 14px; }
    .chat-loading .dot { width: 7px; height: 7px; border-radius: 50%; background: #9fbdc7; animation: chatBlink 1.2s infinite ease-in-out; }
    .chat-loading .dot:nth-child(2) { animation-delay: .15s; }
    .chat-loading .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes chatBlink { 0%, 80%, 100% { opacity: .25; transform: scale(.85); } 40% { opacity: 1; transform: scale(1); } }
    .chat-head-actions { display: flex; gap: 6px; align-items: center; }
    .chat-source-tag { display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; background: rgba(31,117,168,.1); color: var(--primary-dark); }
    .chat-source-tag.local { background: rgba(113,131,143,.15); color: var(--muted); }
    .chat-reasoning { background: #f1f5f7; border: 1px solid var(--line); border-radius: 10px; padding: 8px 11px; margin-bottom: 8px; font-size: 12px; }
    .chat-reasoning summary { cursor: pointer; color: var(--muted); font-weight: 700; user-select: none; list-style: none; display: flex; align-items: center; gap: 6px; }
    .chat-reasoning summary::-webkit-details-marker { display: none; }
    .chat-reasoning summary::before { content: '▶'; font-size: 9px; transition: transform .15s ease; display: inline-block; }
    .chat-reasoning[open] summary::before { transform: rotate(90deg); }
    .chat-reasoning .reasoning-text { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--line); color: #5d6d75; line-height: 1.55; max-height: 280px; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11.5px; }
    .chat-reasoning .reasoning-pulse { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); margin-left: auto; animation: reasoningPulse 1s ease-in-out infinite; }
    .chat-streaming .answer-text::after { content: '▍'; color: var(--primary); margin-left: 1px; animation: cursorBlink 1s steps(2) infinite; }
    .chat-streaming.streamed .answer-text::after, .chat-streaming.streamed .reasoning-pulse { display: none; }
    @keyframes cursorBlink { 50% { opacity: 0; } }
    @keyframes reasoningPulse { 0%, 100% { opacity: .3; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.1); } }

    @media (max-width: 1200px) {
      .metric-grid { grid-template-columns: repeat(3, 1fr); }

    }
  </style>

  <div class="app" id="appShell">

<section class="screen" id="paymentList">

    // Days until (or past) a payment's SLA deadline. <0 overdue, 0 due today, >0 remaining.
    function slaRemainingDays(p) {
      const tier = paymentTier(p);
      const days = slaDays(tier);
      if (days == null) return null;
      return Math.round((new Date(addBusinessDays(p.date, days) + 'T00:00:00') - new Date(demoNow() + 'T00:00:00')) / 86400000);
    }
    function slaChipHtml(diff) {
      if (diff == null) return '';
      if (diff < 0) return `<span class="sla-chip sla-over">⚠ ${t('overdueTag')}</span>`;
      if (diff === 0) return `<span class="sla-chip sla-today">${t('slaToday')}</span>`;
      return `<span class="sla-chip sla-ok">${t('slaLeft')(diff)}</span>`;
    }
    // Home-screen "today's work" list: the unified queue, urgency-sorted, act-in-one-click.
    function renderTodoQueue() {
      const winIds = new Set(dashPayments().map(p => p.id));
      const winVendors = new Set(dashPayments().map(p => p.vendor));
      const queue = buildUnifiedQueue().filter(it => it.kind === 'payment' ? winIds.has(it.name) : winVendors.has(it.vendor));
      const profiles = computeVendorProfiles();
      queue.forEach(it => {
        if (it.kind === 'payment') it._sla = slaRemainingDays(payments[it.idx]);
        else {
          const prof = profiles.find(v => v.vendor === it.vendor);
          const arr = prof ? prof.items.filter(p => !isReviewed(p)).map(slaRemainingDays).filter(x => x != null) : [];
          it._sla = arr.length ? Math.min(...arr) : null;
        }
      });
      // overdue first, then by tier, then by soonest deadline
      queue.sort((a, b) => (Number(b.overdue) - Number(a.overdue)) || (TIER_RANK[a.tier] - TIER_RANK[b.tier]) || ((a._sla == null ? 99 : a._sla) - (b._sla == null ? 99 : b._sla)));

    function getDonutSpec() {
      const payments = dashPayments(); // window-scoped; shadows global for this panel
      if (donutView === 'tier') {
        const counts = { T1: 0, T2: 0, T3: 0 };
        payments.forEach(p => { counts[paymentTier(p)] += 1; });

          colors: TIER_COLORS,

          keys: LEVEL_KEYS,

      return {
        keys: RISK_TYPE_KEYS,
        colors: RISK_COLORS,
        counts,
        total: Object.values(counts).reduce((a, b) => a + b, 0),
        label: k => t('riskTypes')[k],

    function renderDonut() {
      document.querySelectorAll('[data-donutview]').forEach(b => b.classList.toggle('active', b.dataset.donutview === donutView));
      const spec = getDonutSpec();
      const { keys, colors, counts, total, label, insightKey } = spec;
      const denom = total || 1;
      const R = 95, IR = 60, CX = 110, CY = 110;
      let acc = 0;
      const slices = keys.map(k => {
        const v = counts[k];
        if (!v) return '';
        const startAngle = acc / denom * Math.PI * 2 - Math.PI / 2;
        acc += v;
        const endAngle = acc / denom * Math.PI * 2 - Math.PI / 2;
        const x1 = CX + R * Math.cos(startAngle), y1 = CY + R * Math.sin(startAngle);
        const x2 = CX + R * Math.cos(endAngle), y2 = CY + R * Math.sin(endAngle);
        const ix1 = CX + IR * Math.cos(startAngle), iy1 = CY + IR * Math.sin(startAngle);
        const ix2 = CX + IR * Math.cos(endAngle), iy2 = CY + IR * Math.sin(endAngle);
        const large = (endAngle - startAngle) > Math.PI ? 1 : 0;
        return `<path d="M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${IR} ${IR} 0 ${large} 0 ${ix1} ${iy1} Z" fill="${colors[k]}" data-slicekey="${k}" style="cursor:pointer"></path>`;
      }).join('');
      const centerNum = dashPayments().length;
      const svg = `<svg class="donut-svg" viewBox="0 0 220 220">${slices}<text x="110" y="106" text-anchor="middle" font-size="12" fill="#71838f">${t('totalCenter')}</text><text x="110" y="132" text-anchor="middle" font-size="32" font-weight="800" fill="#17313f">${centerNum}</text></svg>`;
      document.getElementById('riskDonut').innerHTML = svg;
      document.getElementById('riskDonutLegend').innerHTML = keys.map(k => {
        const c = counts[k];

        return `<button class="legend-row" data-legendkey="${k}"><span class="legend-dot" style="background:${colors[k]}"></span><span class="legend-label">${label(k)}</span><span class="legend-count">${c}</span><span class="legend-pct">${pct}%</span></button>`;

    // Entry B: vendor-level behavioral signals (aggregate across each vendor's payments)
    function computeVendorProfiles() {
      const map = {};
      payments.forEach(p => {
        (map[p.vendor] = map[p.vendor] || { vendor: p.vendor, country: vendorCountry(p.vendor), items: [] }).items.push(p);
      });
      return Object.values(map).map(prof => {
        const items = prof.items;
        const count = items.length;
        const smallCount = items.filter(p => p.amountNum < 100000).length;
        const precisionHitCount = items.filter(p => (p.precisionHits || []).length > 0).length;
        const signals = vendorSignalMap[prof.vendor] || [];
        // Vendor-level behavioral signals (no hard hit needed) → T2.
        const tier = signals.length ? 'T2' : null;
        return { ...prof, count, smallCount, precisionHitCount, signals, tier, totalAmount: items.reduce((a, p) => a + p.amountNum, 0) };
      });
    }

    function buildUnifiedQueue() {
      const items = [];
      payments.forEach(p => {
        // Payment-level entries = T1 (hard-rule hit). Vendor-level T2 is added below;
        // T2 payments are represented by their vendor entry (avoid double-listing).
        if (paymentTier(p) === 'T1' && !isReviewed(p)) {
          items.push({ tier: 'T1', kind: 'payment', name: p.id, sub: p.vendor, reason: (p.precisionHits || []).map(h => t('hpRules')[h]).join(' · '), idx: payments.indexOf(p), overdue: isOverdue(p) });
        }
      });
      computeVendorProfiles().forEach(v => {
        if (v.tier) {
          items.push({ tier: v.tier, kind: 'vendor', name: v.vendor, sub: `${v.country} · ${v.count} ${lang === 'zh' ? '笔' : 'pmts'}`, reason: v.signals.map(s => t('vendorSignals')[s]).join(' · '), vendor: v.vendor, overdue: v.items.some(isOverdue) });
        }
      });
      items.sort((a, b) => TIER_RANK[a.tier] - TIER_RANK[b.tier]);
      return items;
    }

    const VALIDATE_MIN_REVIEWS = 4; // aligned with CALIB_MIN_SAMPLES — a signal needs this many reviewed before it's "validated"

    // For each signal id, the list of payments that hit it (payment-level precision rules + vendor-level behavioral signals).
    function signalHitMap() {
      const vendorSig = {};
      computeVendorProfiles().forEach(v => { vendorSig[v.vendor] = v.signals; });
      const map = {};
      const ensure = id => (map[id] = map[id] || []);
      payments.forEach(p => {
        (p.precisionHits || []).forEach(id => ensure(id).push(p));
        (vendorSig[p.vendor] || []).forEach(id => ensure(id).push(p));
      });
      discoveredSignals.forEach(ds => payments.forEach(p => { if (ds.predicate(p)) ensure(ds.id).push(p); }));
      return map;
    }

    // P1: derive each signal's PPV from the structured review records, live.
    function buildSignalLedger() {
      const hits = signalHitMap();
      const verdict = {};
      [...reviewedCases].reverse().forEach(r => { if (r.conclusion) verdict[r.paymentId] = r.conclusion; }); // newest (index 0) wins
      const defs = [
        ...HIGH_PRECISION_RULES.map(r => ({ id: r.id, name: t('hpRules')[r.id], level: 'payment' })),
        { id: 'structuring', name: t('vendorSignals').structuring, level: 'vendor' },
        { id: 'surge', name: t('vendorSignals').surge, level: 'vendor' },
        { id: 'cumulativeAlerts', name: t('vendorSignals').cumulativeAlerts, level: 'vendor' },
        ...discoveredSignals.map(ds => ({ id: ds.id, name: lang === 'zh' ? ds.nameZh : ds.nameEn, level: ds.level, discovered: true }))
      ];
      return defs.map(d => {
        const ps = hits[d.id] || [];
        const reviewedPs = ps.filter(p => verdict[p.id]);
        const reviewed = reviewedPs.length;
        const confirmed = reviewedPs.filter(p => verdict[p.id] === 'confirmedFraud').length;
        const ppv = reviewed ? confirmed / reviewed : null;
        const status = signalOverrides[d.id] || (reviewed >= VALIDATE_MIN_REVIEWS ? 'validated' : 'candidate');
        return { ...d, triggers: ps.length, reviewed, confirmed, ppv, status };
      });
    }

    // Tier eligibility is STRUCTURAL for established signals: high-precision payment
    // rules are T1 by rule class (the hit is a deterministic fact — expected PPV ~30%),
    // native vendor signals map to T2. PPV banding is only a reference scale for
    // agent-discovered candidates; Wilson-based calibration guards validated/demoted.
    function structuralTier(id, level) {
      if (HIGH_PRECISION_RULES.some(r => r.id === id)) return 'T1';
      if (level === 'vendor') return 'T2';
      return null;
    }
    function suggestedTier(ppv, id, level) {
      const st = structuralTier(id, level);
      if (st) return st;
      if (ppv == null) return null;
      if (ppv >= 0.5) return 'T1';
      if (ppv >= 0.15) return 'T2';
      return 'T3';
    }
    // The effective alert tier a signal maps to, given its status + PPV.
    function effectiveTier(status, ppv, id, level) {
      if (status === 'demoted') return t('scoringFactor');   // 评分因子
      if (status === 'candidate') return t('tierObserve');   // 观察，不触发
      return suggestedTier(ppv, id, level) || t('tierObserve');
    }

    function renderSignals() {
      document.getElementById('signalHeader').innerHTML = t('signalHeaders').map(h => `<th>${h}</th>`).join('');
      const ledger = buildSignalLedger();
      document.getElementById('signalRows').innerHTML = ledger.map(s => {
        const pct = s.ppv == null ? null : Math.round(s.ppv * 100);
        const tier = suggestedTier(s.ppv, s.id, s.level);
        const levelTag = s.level === 'payment' ? 'tag-blue' : 'tag-amber';
        const statusTag = s.status === 'validated' ? 'tag-green' : s.status === 'demoted' ? 'tag-red' : 'tag-gray';
        const ppvCell = pct == null
          ? '<span class="small-muted">—</span>'
          : `<div class="ppv-cell"><div class="ppv-bar"><span style="width:${pct}%"></span></div><span class="ppv-num">${pct}%</span></div>`;
        const tierMark = s.status === 'demoted' ? `<span class="small-muted">${t('scoringFactor')}</span>` : (tier == null ? '<span class="small-muted">—</span>' : `<span class="tier-badge tier-${tier}">${s.status === 'validated' ? tier : tier + '?'}</span>`);
        const rollup = ROLLUP_SIGNALS.includes(s.id) ? ` <span class="rollup-tag" title="${t('signalRollupNote')}">${t('signalRollupShort')}</span>` : '';
        const agent = s.discovered ? ` <span class="agent-tag">${t('agentDiscoveredTag')}</span>` : '';
        return `<tr><td><strong>${s.name}</strong>${rollup}${agent}</td><td><span class="tag ${levelTag}">${t('signalLevels')[s.level]}</span></td><td>${s.triggers}</td><td>${s.reviewed}</td><td>${s.confirmed}</td><td>${ppvCell}</td><td>${tierMark}</td><td><span class="tag ${statusTag}">${t('signalStatusMap')[s.status]}</span></td></tr>`;
      }).join('');
      const validated = ledger.filter(s => s.status === 'validated');
      const candidates = ledger.filter(s => s.status === 'candidate');
      const avgPpv = validated.length ? Math.round(validated.reduce((a, s) => a + (s.ppv || 0), 0) / validated.length * 100) : 0;
      const labels = t('signalMetricLabels');
      const vals = [validated.length, candidates.length, avgPpv + '%'];
      document.getElementById('signalMetrics').innerHTML = vals.map((v, i) => `<div class="card metric"><div class="metric-label">${labels[i]}</div><div class="metric-value">${v}</div></div>`).join('');

    // Evolution A — render the investigation playbook (grows/strengthens from reviews)
    function renderPlaybook() {
      const card = document.getElementById('playbookCard');
      if (card) card.style.display = SHOW_PLAYBOOK ? '' : 'none';
      if (!SHOW_PLAYBOOK) return;

      document.getElementById('playbookRows').innerHTML = investigationPlaybook.map(e => {

    // ── Monthly calibration ──────────────────────────────────────────
    const CALIB_MIN_SAMPLES = 4;   // need at least this many reviewed before trusting PPV
    const CALIB_PROMOTE = 0.08;    // Wilson 95% lower bound ≥ this → validated trigger
    function wilson(conf, n) {
      if (!n) return { lo: 0, up: 0 };
      const z = 1.96, p = conf / n;
      const denom = 1 + z * z / n;
      const center = p + z * z / (2 * n);
      const margin = z * Math.sqrt(p * (1 - p) / n + z * z / (4 * n * n));
      return { lo: Math.max(0, (center - margin) / denom), up: Math.min(1, (center + margin) / denom) };
    }
    function buildCalibration() {
      return buildSignalLedger().map(s => {
        const ci = wilson(s.confirmed, s.reviewed);
        let proposed;
        if (s.reviewed < CALIB_MIN_SAMPLES) proposed = 'candidate';
        else if (ci.lo >= CALIB_PROMOTE) proposed = 'validated';
        else proposed = 'demoted';
        return { id: s.id, name: s.name, level: s.level, samples: s.reviewed, ppv: s.ppv, wl: ci.lo, wu: ci.up, current: s.status, proposed, changed: s.status !== proposed };
      });
    }
    function renderCalibration() {
      const rows = buildCalibration();
      const changes = rows.filter(r => r.changed).length;
      document.getElementById('calibHeader').innerHTML = t('calibHeaders').map(h => `<th>${h}</th>`).join('');
      document.getElementById('calibSummary').innerHTML = `
        <div class="calib-rules">
          <div class="invest-label">${t('calibRulesTitle')}</div>
          <div class="calib-rule"><span class="tag tag-gray">${t('signalStatusMap').candidate}</span><span>${t('calibRuleCandidate')}</span></div>
          <div class="calib-rule"><span class="tag tag-green">${t('signalStatusMap').validated}</span><span>${t('calibRuleValidated')}</span></div>
          <div class="calib-rule"><span class="tag tag-red">${t('signalStatusMap').demoted}</span><span>${t('calibRuleDemoted')}</span></div>
          <p class="driver-meta calib-rule-note">${t('calibRuleNote')}</p>
        </div>
        <div class="notice">${t('calibSummary')(demoNow(), rows.length, changes)}</div>
        <p class="ci-legend">${t('calibCiLegend')}</p>`;
      document.getElementById('calibRows').innerHTML = rows.map(r => {
        const statusBadge = st => `<span class="tag ${st === 'validated' ? 'tag-green' : st === 'demoted' ? 'tag-red' : 'tag-gray'}">${t('signalStatusMap')[st]}</span>`;
        const cell = st => {
          const et = effectiveTier(st, r.ppv, r.id, r.level);
          const tierMark = ['T1', 'T2', 'T3'].includes(et) ? `<span class="tier-badge tier-${et}">${et}</span>` : `<span class="calib-tier-text">${et}</span>`;
          return `<span class="calib-cell">${statusBadge(st)}${tierMark}</span>`;
        };
        const arrow = r.changed ? `${cell(r.current)} <span class="calib-arrow">→</span> ${cell(r.proposed)}` : `${cell(r.current)} <span class="small-muted">· ${t('calibNoChange')}</span>`;
        let ciCell;
        if (!r.samples || r.ppv == null) {
          ciCell = '<span class="small-muted">—</span>';
        } else {
          const lo = Math.round(r.wl * 100), up = Math.round(r.wu * 100), pt = Math.round(r.ppv * 100);
          const pass = r.wl >= CALIB_PROMOTE;
          ciCell = `<div class="ci-cell"><div class="ci-track"><div class="ci-threshold"></div><div class="ci-range ${pass ? 'ci-pass' : 'ci-fail'}" style="left:${lo}%;width:${Math.max(up - lo, 1.5)}%"></div><div class="ci-point" style="left:${pt}%"></div></div><div class="ci-nums"><span>PPV <strong>${pt}%</strong></span><span class="${pass ? 'ci-ok' : 'ci-bad'}">95%CI ${lo}–${up}%</span></div></div>`;
        }
        return `<tr${r.changed ? ' class="calib-changed"' : ''}><td><strong>${r.name}</strong></td><td>${r.samples}</td><td>${ciCell}</td><td>${arrow}</td></tr>`;
      }).join('');
      document.getElementById('applyCalib').disabled = changes === 0;
      return rows;
    }
    let _calibRows = [];
    function openCalibration() {
      _calibRows = renderCalibration();
      // Running the monthly calibration consumes all pending Legal feedback —
      // their conclusions are now baked into the rolling PPV, so flip the status.
      const pending = reviewedCases.filter(r => r.status === 'Model Feedback Pending');
      pending.forEach(r => { r.status = 'Model Feedback Incorporated'; });
      if (pending.length) renderLegal();
      document.getElementById('calibModal').classList.add('open');
    }
    function applyCalibration() {
      _calibRows.forEach(r => { signalOverrides[r.id] = r.proposed; });
      renderSignals();
      document.getElementById('calibModal').classList.remove('open');
      showToast(t('calibApplied'));
    }

    // ── Hermes-style self-learning: agent surfaces a candidate signal from experience ──
    function discoveryStats() {
      const ds = AGENT_DISCOVERY;
      const verdict = {};
      reviewedCases.forEach(r => { if (r.conclusion) verdict[r.paymentId] = r.conclusion; });
      const hits = payments.filter(ds.predicate);
      const reviewed = hits.filter(p => verdict[p.id]);
      const confirmed = reviewed.filter(p => verdict[p.id] === 'confirmedFraud');
      const ci = wilson(confirmed.length, reviewed.length);
      return { ds, hits, reviewed, confirmed, ppv: reviewed.length ? confirmed.length / reviewed.length : 0, ci, learnedFrom: confirmed };
    }
    function renderDiscovery() {
      const s = discoveryStats();
      const already = discoveredSignals.some(x => x.id === s.ds.id);
      const name = lang === 'zh' ? s.ds.nameZh : s.ds.nameEn;
      const pct = s.reviewed.length ? Math.round(s.ppv * 100) : 0;
      const lo = Math.round(s.ci.lo * 100);
      document.getElementById('discoveryBody').innerHTML = `
        <div class="notice">${t('discoveryIntro')(s.confirmed.length)}</div>
        <div class="disc-pattern"><div class="invest-label">${t('discoveryPatternLabel')}</div><div class="disc-pattern-name">${name}</div><div class="driver-meta">${t('discoveryPatternDesc')}</div></div>

        <div class="chat-stats" style="margin-top:12px"><div class="chat-stat"><div class="chat-stat-value">${s.hits.length}</div><div class="chat-stat-label">${t('signalHeaders')[2]}</div></div><div class="chat-stat"><div class="chat-stat-value">${s.reviewed.length}</div><div class="chat-stat-label">${t('signalHeaders')[3]}</div></div><div class="chat-stat"><div class="chat-stat-value">${pct}%</div><div class="chat-stat-label">PPV (CI≥${lo}%)</div></div></div>
        <div class="notice" style="margin-top:12px">${t('discoveryRec')}</div>
        ${already ? `<p class="ci-legend" style="color:var(--green)">✓ ${t('discoveryAlready')}</p>` : ''}`;
      document.getElementById('addDiscovery').disabled = already;

    function applyFilters() {
      const kw = filters.keyword.trim().toLowerCase();
      return payments.filter(p => {
        if (filters.tier && paymentTier(p) !== filters.tier) return false;
        if (filters.riskType && !p.riskTypes.includes(filters.riskType)) return false;
        if (filters.source && p.source !== filters.source) return false;
        if (filters.riskLevel && p.status !== filters.riskLevel) return false;
        if (filters.dateFrom && p.date < filters.dateFrom) return false;
        if (filters.dateTo && p.date > filters.dateTo) return false;
        if (kw) {
          const blob = `${p.id} ${p.vendor} ${p.category} ${p.categoryZh} ${p.source}`.toLowerCase();
          if (!blob.includes(kw)) return false;
        }
        return true;
      });
    }

      stepsEl.innerHTML = ''; evEl.innerHTML = ''; pkgEl.innerHTML = `<span class="small-muted">${t('investRunning')}</span>`; recEl.innerHTML = '';
      reasoningWrap.style.display = 'none'; reasoningEl.textContent = '';
      document.getElementById('runInvestigateBtn').disabled = true;

      const backend = getBackendUrl();
      if (!backend) { pkgEl.innerHTML = `<em>${t('chatBackendError')}</em>`; document.getElementById('runInvestigateBtn').disabled = false; return; }
      const prof = computeVendorProfiles().find(v => v.vendor === payment.vendor);
      const vendorSignals = prof ? prof.signals : [];
      // Evolution A — apply learned investigation playbook routines (and count the use)
      const pbWrap = document.getElementById('investPlaybookWrap');
      const applied = appliedPlaybook(payment);
      if (applied.length && SHOW_PLAYBOOK) {
        applied.forEach(e => { e.uses += 1; });
        pbWrap.style.display = '';
        document.getElementById('investPlaybook').innerHTML = applied.map(e => `<div class="invest-pb-item">▸ <strong>${lang === 'zh' ? e.nameZh : e.nameEn}</strong> — ${lang === 'zh' ? e.actZh : e.actEn}</div>`).join('');
        renderPlaybook();
      } else { pbWrap.style.display = 'none'; }
      let pkgText = '', reasoningBuf = '', rec = '', started = false;
      const evLines = [];

      const handle = data => {
        if (data.type === 'step') {
          stepsEl.insertAdjacentHTML('beforeend', `<div class="invest-step">▸ ${escapeHtml(data.text)}</div>`);
        } else if (data.type === 'evidence') {
          evLines.push(`[${data.source}] ${data.text}`);
          evEl.insertAdjacentHTML('beforeend', `<div class="invest-evi"><span class="invest-evi-src">${escapeHtml(data.source)}</span>${escapeHtml(data.text)}</div>`);
        } else if (data.type === 'reasoning') {
          if (reasoningWrap.style.display === 'none') reasoningWrap.style.display = '';
          reasoningBuf += data.text; reasoningEl.textContent = reasoningBuf; reasoningEl.scrollTop = reasoningEl.scrollHeight;
        } else if (data.type === 'delta') {
          if (!started) { pkgEl.innerHTML = ''; started = true; }
          pkgText += data.text; pkgEl.innerHTML = pkgText.split('__REC__:')[0];
        } else if (data.type === 'done') {
          if (data.text) pkgEl.innerHTML = data.text;
          rec = data.recommendation || rec;
          currentInvestRec = rec;
          if (reasoningBuf) reasoningWrap.removeAttribute('open'); else reasoningWrap.style.display = 'none';
          // recommendation drives pre-fill + hold logic internally; no separate action badge shown
          // pre-fill the review form from the AI result
          const sel = document.getElementById('reviewResult');
          if (REC_CONCLUSION[rec]) sel.value = REC_CONCLUSION[rec];
          const reasonEl = document.getElementById('reviewReason');
          if (!reasonEl.dataset.touched) {
            const summary = (data.text || pkgText.split('__REC__:')[0]).replace(/<[^>]+>/g, '').trim();
            reasonEl.value = [summary, evLines.length ? '\n• ' + evLines.join('\n• ') : ''].filter(Boolean).join('');
          }
        } else if (data.type === 'error') {
          pkgEl.innerHTML = `<em style="color:#8a6115">⚠ ${escapeHtml(data.message || 'error')}</em>`;
        }
      };

      try {
        const resp = await fetch(backend + '/api/aml/investigate/stream', {
          method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
          body: JSON.stringify({ payment, vendorCountry: vendorCountry(payment.vendor), vendorSignals, lang })
        });
        if (!resp.ok || !resp.body) throw new Error('HTTP ' + resp.status);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        const flush = block => { const dl = block.split('\n').filter(l => l.startsWith('data:')).map(l => l.slice(5).trim()); if (!dl.length) return; try { handle(JSON.parse(dl.join('\n'))); } catch {} };
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true }).replace(/\r\n/g, '\n');
          let idx; while ((idx = buffer.indexOf('\n\n')) >= 0) { flush(buffer.slice(0, idx)); buffer = buffer.slice(idx + 2); }
        }
        buffer += decoder.decode(); if (buffer.trim()) flush(buffer);
      } catch (e) {
        pkgEl.innerHTML = `<em style="color:#8a6115">⚠ ${escapeHtml(t('chatBackendError'))} (${escapeHtml(e.message || String(e))})</em>`;
      } finally {
        document.getElementById('runInvestigateBtn').disabled = false;
      }
    }

    function detectRiskType(q) {
      if (/geo|country|jurisdic|offshore|地理|国家|司法|离岸/i.test(q)) return 'geographic';
      if (/pep|politic|exposed|政治|公众人物/i.test(q)) return 'pep';
      if (/media|adverse|news|negative|媒体|不利|负面/i.test(q)) return 'adverseMedia';
      if (/doc|missing|invoice|contract|文件|缺失|发票|合同/i.test(q)) return 'docMissing';
      if (/time|holiday|weekend|surge|night|时间|节假|周末|突增/i.test(q)) return 'timeAnomaly';
      if (/behavi|fraud|fake|account|routing|账户|行为|虚假/i.test(q)) return 'behavior';
      return null;
    }

    function findVendorMatch(q) {
      const lower = q.toLowerCase();
      const direct = vendors.find(v => lower.includes(v.name.toLowerCase()));
      if (direct) return direct.name;
      for (const v of vendors) {
        const tokens = v.name.toLowerCase().replace(/[.,]/g, '').split(/\s+/);
        if (tokens.some(tok => tok.length > 3 && lower.includes(tok))) return v.name;
      }
      const uniqueVendorsInPayments = [...new Set(payments.map(p => p.vendor))];
      for (const n of uniqueVendorsInPayments) {
        const tokens = n.toLowerCase().replace(/[.,]/g, '').split(/\s+/);
        if (tokens.some(tok => tok.length > 3 && lower.includes(tok))) return n;
      }
      return null;
    }

    async function syncFromServer() {
      try {
        const r = await fetch(getBackendUrl() + '/api/aml/reviews').then(x => x.json());
        let merged = 0;
        if (r && r.db && Array.isArray(r.reviews)) {
          // Server returns newest-first; walk oldest-first so unshift keeps newest at index 0
          // (verdict maps take index 0 as the latest conclusion).
          [...r.reviews].reverse().forEach(row => {
            if (reviewedCases.some(c => c.paymentId === row.paymentId)) return; // seed/session copy wins
            const p = payments.find(x => x.id === row.paymentId) || {};
            reviewedCases.unshift({ caseId: p.caseId || '', paymentId: row.paymentId, vendor: row.vendor || p.vendor || '', score: p.total || 0, result: resultFromConclusion(row.conclusion), conclusion: row.conclusion, by: row.reviewer || 'Legal Team', reason: row.reason || '', reasonZh: '', tags: [t('syncedTag')], status: 'Model Feedback Pending' });
            merged += 1;
          });
        }
        const pb = await fetch(getBackendUrl() + '/api/aml/playbook').then(x => x.json());
        if (pb && pb.db && Array.isArray(pb.playbook)) {
          pb.playbook.forEach(row => {
            let e = investigationPlaybook.find(x => x.id === row.id);
            if (!e && row.id === 'adverseMedia') {
              // The one discoverable routine — recreate it from its known definition with server counts.
              e = { id: 'adverseMedia', nameEn: 'Adverse-media hit', nameZh: '不利媒体命中', actEn: 'retrieve last-12-month negative coverage and link to the entity', actZh: '检索近 12 月负面报道并关联实体', uses: 0, confirmed: 0, match: q => q.riskTypes.includes('adverseMedia'), isNew: true };
              investigationPlaybook.push(e);
            }
            if (e) { e.uses = Math.max(e.uses, row.uses || 0); e.confirmed = Math.max(e.confirmed, row.confirmed || 0); }
          });
        }
        if (merged) { renderLegal(); renderSignals(); renderUnifiedQueue(); renderMetrics(); renderTodoQueue(); renderPaymentList(); }
        renderPlaybook();
      } catch (e) { console.warn('syncFromServer skipped (offline / db disabled):', e); }
    }

    async function chatRespond(query) {
      const q = query.trim();
      if (!q) return;
      chatAppend(escapeHtml(q), 'user');
      chatHistory.push({ role: 'user', content: q });

      const backend = getBackendUrl();
      if (backend) {
        chatAppendLoading();
        let bubble = null;
        let reasoningEl, reasoningTextEl, answerEl, extrasEl;
        const messagesEl = document.getElementById('chatMessages');
        let reasoningBuf = '';
        let answerBuf = '';
        let finalText = '';
        let finalIds = [];
        let streamError = null;

        const ensureBubble = () => {
          if (bubble) return;
          removeChatLoading();
          bubble = createStreamingBubble();
          reasoningEl = bubble.querySelector('.chat-reasoning');
          reasoningTextEl = bubble.querySelector('.reasoning-text');
          answerEl = bubble.querySelector('.answer-text');
          extrasEl = bubble.querySelector('.answer-extras');
        };

        const updateAnswerView = () => {
          if (!answerEl) return;
          const visible = answerBuf.split('__IDS__:')[0];
          answerEl.innerHTML = visible;
        };

        try {
          const resp = await fetch(backend + '/api/aml/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
            body: JSON.stringify({ message: q, payments, history: chatHistory.slice(-7, -1), lang })
          });
          if (!resp.ok) {
            const txt = await resp.text().catch(() => '');
            throw new Error('HTTP ' + resp.status + (txt ? ': ' + txt.slice(0, 120) : ''));
          }
          if (!resp.body) throw new Error('No response body for streaming');

          const reader = resp.body.getReader();
          const decoder = new TextDecoder();
          let buffer = '';

          const handleEvent = data => {
            ensureBubble();
            if (data.type === 'reasoning') {
              if (reasoningEl.style.display === 'none') reasoningEl.style.display = '';
              reasoningBuf += data.text;
              reasoningTextEl.textContent = reasoningBuf;
              reasoningTextEl.scrollTop = reasoningTextEl.scrollHeight;
            } else if (data.type === 'delta') {
              answerBuf += data.text;
              updateAnswerView();
            } else if (data.type === 'done') {
              if (data.text) finalText = data.text;
              if (Array.isArray(data.paymentIds)) finalIds = data.paymentIds;
            } else if (data.type === 'error') {
              streamError = data.message || 'stream error';
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
          };

          const tryParseBlock = block => {
            const dataLines = block.split('\n').filter(l => l.startsWith('data:')).map(l => l.slice(5).trim());
            if (!dataLines.length) return;
            const payload = dataLines.join('\n');
            try { handleEvent(JSON.parse(payload)); } catch (e) { /* skip malformed */ }
          };

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            buffer = buffer.replace(/\r\n/g, '\n');
            let idx;
            while ((idx = buffer.indexOf('\n\n')) >= 0) {
              tryParseBlock(buffer.slice(0, idx));
              buffer = buffer.slice(idx + 2);
            }
          }
          buffer += decoder.decode();
          buffer = buffer.replace(/\r\n/g, '\n');
          if (buffer.trim()) tryParseBlock(buffer);

          if (streamError) throw new Error(streamError);

          ensureBubble();
          bubble.classList.add('streamed');
          const cleanText = (finalText || answerBuf.split('__IDS__:')[0]).trim();
          answerEl.innerHTML = cleanText;
          if (reasoningBuf.trim()) {
            reasoningEl.removeAttribute('open');
          } else {
            reasoningEl.remove();
          }
          const cards = finalIds.map(id => payments.find(p => p.id === id)).filter(Boolean);
          if (cards.length) {
            extrasEl.innerHTML = chatStatsBlock(cards) + cards.map(chatPaymentCard).join('');
            extrasEl.querySelectorAll('[data-chatcase]').forEach(b => b.addEventListener('click', () => openCase(payments[Number(b.dataset.chatcase)])));
          }
          if (!cleanText && !cards.length) {
            answerEl.innerHTML = `<em>${t('chatNoResults')}</em>`;
          }
          const tagEl = document.createElement('div');
          tagEl.innerHTML = `<span class="chat-source-tag">${t('chatSourceLlm')}</span>`;
          bubble.appendChild(tagEl.firstElementChild);

          chatHistory.push({ role: 'assistant', content: cleanText });
          return;
        } catch (e) {
          removeChatLoading();
          if (bubble) bubble.remove();
          chatAppend(`<em style="color:#8a6115">⚠ ${escapeHtml(t('chatBackendError'))} (${escapeHtml(e.message || String(e))})</em>`, 'bot');
        }
      }
      localChatRespond(q);
    }

    function localChatRespond(q) {
      const vendorName = findVendorMatch(q);
      const tag = `<br/><span class="chat-source-tag local">${t('chatSourceLocal')}</span>`;
      if (vendorName) {
        const matches = payments.filter(p => p.vendor === vendorName);
        if (matches.length) {
          matches.sort((a, b) => b.total - a.total);
          const intro = t('chatVendorIntro')(vendorName, matches.length);
          const stats = chatStatsBlock(matches);
          const cards = matches.slice(0, 4).map(chatPaymentCard).join('');
          const filterBtn = `<div style="margin-top:8px"><button class="chat-suggestion" data-chatfilter="${vendorName.replace(/"/g, '&quot;')}">${t('chatFilterByVendor')}</button></div>`;
          chatAppend(intro + stats + cards + filterBtn + tag, 'bot');
          chatHistory.push({ role: 'assistant', content: intro });
          return;
        }
      }

      const riskKey = detectRiskType(q);
      if (riskKey) {
        const matches = payments.filter(p => p.riskTypes.includes(riskKey));
        matches.sort((a, b) => b.total - a.total);
        const high = matches.filter(p => p.status === 'High').length;
        const vSet = new Set(matches.map(p => p.vendor));
        const intro = t('chatRiskTypeIntro')(t('riskTypes')[riskKey], matches.length, high, vSet.size);
        const stats = chatStatsBlock(matches);
        const cards = matches.slice(0, 4).map(chatPaymentCard).join('');
        chatAppend(intro + stats + cards + tag, 'bot');
        chatHistory.push({ role: 'assistant', content: intro });
        return;
      }

      if (/high\s*risk|high-risk|critical|top|summary|overview|高风险|高 ?风险|总结|概览/i.test(q)) {
        const high = payments.filter(p => p.status === 'High').sort((a, b) => b.total - a.total);
        const stats = chatStatsBlock(high);
        const cards = high.slice(0, 5).map(chatPaymentCard).join('');
        const intro = t('chatHighRiskIntro')(high.length);
        chatAppend(intro + stats + cards + tag, 'bot');
        chatHistory.push({ role: 'assistant', content: intro });
        return;
      }

      if (/all|list|show|列表|全部/i.test(q)) {
        chatAppend(t('chatListIntro') + tag, 'bot');
        chatHistory.push({ role: 'assistant', content: t('chatListIntro') });
        showScreen('paymentList');
        return;
      }

      chatAppend(t('chatFallback') + chatSuggestionsHtml() + tag, 'bot');
      chatHistory.push({ role: 'assistant', content: t('chatFallback') });
    }

    function initChatResize() {
      const panel = document.getElementById('chatPanel');
      const handle = document.getElementById('chatResize');
      const savedWidth = parseInt(localStorage.getItem('aml_chat_width') || '', 10);
      if (savedWidth && savedWidth >= 320) {
        document.documentElement.style.setProperty('--chat-width', savedWidth + 'px');
      }
      let startX = 0, startWidth = 0, resizing = false;
      handle.addEventListener('mousedown', e => {
        resizing = true;
        startX = e.clientX;
        startWidth = panel.offsetWidth;
        document.body.classList.add('chat-resizing');
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!resizing) return;
        const dx = startX - e.clientX;
        const next = Math.max(320, Math.min(window.innerWidth * 0.9, startWidth + dx));
        document.documentElement.style.setProperty('--chat-width', next + 'px');
      });
      document.addEventListener('mouseup', () => {
        if (!resizing) return;
        resizing = false;
        document.body.classList.remove('chat-resizing');
        localStorage.setItem('aml_chat_width', panel.offsetWidth);
      });
    }

    document.getElementById('closeDiscovery').addEventListener('click', () => document.getElementById('discoveryModal').classList.remove('open'));
    document.getElementById('cancelDiscovery').addEventListener('click', () => document.getElementById('discoveryModal').classList.remove('open'));
    document.getElementById('addDiscovery').addEventListener('click', addDiscovery);
    document.getElementById('closeCalib').addEventListener('click', () => document.getElementById('calibModal').classList.remove('open'));
    document.getElementById('cancelCalib').addEventListener('click', () => document.getElementById('calibModal').classList.remove('open'));
    document.getElementById('applyCalib').addEventListener('click', applyCalibration);

    document.getElementById('filterKeyword').addEventListener('input', e => { draftFilters.keyword = e.target.value; });
    document.getElementById('filterKeyword').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('applyFiltersBtn').click(); });
    document.getElementById('filterTier').addEventListener('change', e => { draftFilters.tier = e.target.value; });
    document.getElementById('filterRiskType').addEventListener('change', e => { draftFilters.riskType = e.target.value; });
    document.getElementById('filterSource').addEventListener('change', e => { draftFilters.source = e.target.value; });
    document.getElementById('filterRiskLevel').addEventListener('change', e => { draftFilters.riskLevel = e.target.value; });
    document.getElementById('filterDateFrom').addEventListener('change', e => { draftFilters.dateFrom = e.target.value; });
    document.getElementById('filterDateTo').addEventListener('change', e => { draftFilters.dateTo = e.target.value; });
    document.getElementById('applyFiltersBtn').addEventListener('click', () => {
      Object.keys(filters).forEach(k => { filters[k] = draftFilters[k]; });
      listPage = 1;
      renderPaymentList();
    });
    document.getElementById('resetFilters').addEventListener('click', () => {
      Object.keys(filters).forEach(k => { filters[k] = ''; draftFilters[k] = ''; });
      listPage = 1;
      renderPaymentList();
    });
    document.getElementById('prevListPage').addEventListener('click', () => { listPage -= 1; renderPaymentList(); });
    document.getElementById('nextListPage').addEventListener('click', () => { listPage += 1; renderPaymentList(); });

    document.getElementById('caseReviewedBtnBottom').addEventListener('click', () => openCaseReview(currentPayment));
    document.getElementById('exportListBtn').addEventListener('click', () => showToast(t('exportDemoNote')));
    document.getElementById('exportCaseBtn').addEventListener('click', () => showToast(t('exportDemoNote')));
    document.getElementById('runInvestigateBtn').addEventListener('click', startInvestigation);
    document.getElementById('closeInvestigate').addEventListener('click', closeInvestigateModal);
    document.getElementById('cancelReview').addEventListener('click', closeInvestigateModal);
    document.getElementById('reviewReason').addEventListener('input', e => e.target.dataset.touched = 'true');
    document.getElementById('submitReview').addEventListener('click', () => {
      const tags = [...document.querySelectorAll('.check input:checked')].map(i => i.value);
      const conclusion = document.getElementById('reviewResult').value; // notFraud | confirmedFraud | needEvidence
      reviewedCases.unshift({ caseId: currentPayment.caseId, paymentId: currentPayment.id, vendor: currentPayment.vendor, score: currentPayment.total, result: resultFromConclusion(conclusion), conclusion, by: 'Legal Team', reason: document.getElementById('reviewReason').value.trim() || t('legalReviewCompleted'), reasonZh: lang === 'zh' ? (document.getElementById('reviewReason').value.trim() || t('legalReviewCompleted')) : '', tags: tags.length ? tags : [t('noFeedbackTag')], status: 'Model Feedback Pending' });
      // Confirmed fraud + agent recommended escalate → simulate "hold payment" (real system would call the payment API)
      if (conclusion === 'confirmedFraud' && currentInvestRec === 'escalate') currentPayment.held = true;
      // Evolution A — confirmed fraud reinforces / grows the investigation playbook
      let pbMsg = '';
      if (conclusion === 'confirmedFraud') { const pbRes = learnPlaybook(currentPayment); if (SHOW_PLAYBOOK) pbMsg = pbRes === 'new' ? ' · ' + t('playbookGrew') : ' · ' + t('playbookReinforced'); persistPlaybook(); }
      persistReview(reviewedCases[0]);
      renderLegal(); renderSignals(); renderPlaybook(); renderUnifiedQueue(); renderMetrics(); renderTodoQueue(); renderPaymentList(); closeInvestigateModal(); showToast((currentPayment.held ? t('reviewSavedHeld') : t('reviewSaved')) + pbMsg); showScreen('legal');
      document.querySelector('[data-wbtab="reviewed"]').click();
    });
    document.getElementById('saveConfig').addEventListener('click', () => showToast(t('configSaved')));

    document.getElementById('chatFab').addEventListener('click', () => toggleChat());
    document.getElementById('chatClose').addEventListener('click', () => toggleChat(false));
    document.getElementById('chatSend').addEventListener('click', chatSend);
    document.getElementById('chatInputBox').addEventListener('keydown', e => { if (e.key === 'Enter') chatSend(); });

    assignPrecisionHits();
    applyLanguage();
    openCase(payments[0]);
    showScreen('dashboard');
    initChatResize();
    syncFromServer();
  </script>
</body>
</html>
